<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Objectif Cross">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Objectif Cross</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:
    radial-gradient(circle at top,#1d4ed8 0%,transparent 35%),
    linear-gradient(180deg,#020617,#0f172a);
  color:white;
  min-height:100vh;
}

.app{
  min-height:100vh;
  max-width:430px;
  margin:auto;
  padding:calc(55px + env(safe-area-inset-top)) 18px 22px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.header{text-align:center}
.header h1{
  margin:0;
  font-size:30px;
  font-weight:900;
  letter-spacing:-1px;
}
.header p{
  margin:6px 0 0;
  color:#cbd5e1;
  font-size:14px;
}

.bigcard{
  background:rgba(15,23,42,.82);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:32px;
  padding:22px;
  box-shadow:0 25px 60px rgba(0,0,0,.45);
}

.total{text-align:center}
.total span{
  color:#94a3b8;
  font-size:13px;
}
.total strong{
  display:block;
  font-size:46px;
  line-height:1;
  margin-top:8px;
  color:#4ade80;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:20px;
}
.stat{
  background:rgba(255,255,255,.06);
  border-radius:20px;
  padding:14px;
  text-align:center;
}
.stat small{
  display:block;
  color:#94a3b8;
  font-size:12px;
  margin-bottom:6px;
}
.stat b{font-size:20px}

.progress-wrap{margin-top:20px}
.bar{
  height:18px;
  background:#020617;
  border-radius:999px;
  overflow:hidden;
}
.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#bef264);
  border-radius:999px;
  transition:.3s;
}
.progress-info{
  display:flex;
  justify-content:space-between;
  color:#94a3b8;
  font-size:13px;
  margin-top:8px;
}

.form{
  background:rgba(15,23,42,.9);
  border:1px solid rgba(255,255,255,.1);
  border-radius:28px;
  padding:14px;
}

.inputs{
  display:grid;
  grid-template-columns:1fr 105px;
  gap:10px;
}

input{
  height:54px;
  border:none;
  outline:none;
  border-radius:18px;
  background:#020617;
  color:white;
  padding:0 15px;
  font-size:16px;
}

input::placeholder{color:#64748b}

button{
  width:100%;
  height:54px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#22c55e,#86efac);
  color:#052e16;
  font-size:17px;
  font-weight:900;
  margin-top:10px;
}

.list{
  flex:1;
  min-height:150px;
  overflow:auto;
  background:rgba(15,23,42,.72);
  border:1px solid rgba(255,255,255,.1);
  border-radius:28px;
  padding:10px;
}

.sale{
  display:grid;
  grid-template-columns:1fr auto 36px;
  gap:10px;
  align-items:center;
  background:rgba(255,255,255,.07);
  border-radius:20px;
  padding:12px;
  margin-bottom:8px;
}
.sale-name{
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.sale-date{
  font-size:11px;
  color:#94a3b8;
  margin-top:3px;
}
.sale-price{
  color:#4ade80;
  font-weight:900;
}
.delete{
  width:36px;
  height:36px;
  margin:0;
  border-radius:14px;
  background:#451a1a;
  color:#fca5a5;
  font-size:20px;
}

.empty{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#94a3b8;
  font-size:14px;
}

.bottom{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.bottom button{
  background:rgba(255,255,255,.1);
  color:white;
  font-size:14px;
}
</style>
</head>

<body>
<div class="app">

  <div class="header">
    <h1>Objectif Cross</h1>
    <p>Vends tes objets pour atteindre les 3 000 €</p>
  </div>

  <div class="bigcard">
    <div class="total">
      <span>Total récolté</span>
      <strong id="total">0 €</strong>
    </div>

    <div class="stats">
      <div class="stat">
        <small>Reste</small>
        <b id="left">3 000 €</b>
      </div>
      <div class="stat">
        <small>Objectif</small>
        <b id="goalText">3 000 €</b>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="progress-info">
        <span id="percent">0%</span>
        <span id="count">0 vente</span>
      </div>
    </div>
  </div>

  <div class="form">
    <div class="inputs">
      <input id="item" placeholder="Objet vendu">
      <input id="price" type="number" inputmode="decimal" placeholder="Prix €">
    </div>
    <button onclick="addSale()">+ Ajouter la vente</button>
  </div>

  <div class="list" id="list"></div>

  <div class="bottom">
    <button onclick="changeGoal()">Changer objectif</button>
    <button onclick="resetAll()">Reset</button>
  </div>

</div>

<script>
let goal = Number(localStorage.getItem("goalCross") || 3000);
let sales = JSON.parse(localStorage.getItem("salesCross") || "[]");

function euro(n){
  return new Intl.NumberFormat("fr-FR",{
    style:"currency",
    currency:"EUR",
    maximumFractionDigits:0
  }).format(n);
}

function save(){
  localStorage.setItem("goalCross", goal);
  localStorage.setItem("salesCross", JSON.stringify(sales));
}

function today(){
  return new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});
}

function render(){
  let total = sales.reduce((s,x)=>s+Number(x.price),0);
  let left = Math.max(goal-total,0);
  let percent = Math.min((total/goal)*100,100);

  document.getElementById("total").textContent = euro(total);
  document.getElementById("left").textContent = euro(left);
  document.getElementById("goalText").textContent = euro(goal);
  document.getElementById("fill").style.width = percent + "%";
  document.getElementById("percent").textContent = Math.round(percent) + "% atteint";
  document.getElementById("count").textContent = sales.length + (sales.length>1 ? " ventes" : " vente");

  let list = document.getElementById("list");

  if(sales.length === 0){
    list.innerHTML = '<div class="empty">Aucune vente pour l’instant<br>Ajoute ton premier objet 👆</div>';
    return;
  }

  list.innerHTML = "";

  sales.slice().reverse().forEach((sale,index)=>{
    let realIndex = sales.length - 1 - index;
    let div = document.createElement("div");
    div.className = "sale";
    div.innerHTML = `
      <div>
        <div class="sale-name">${sale.item}</div>
        <div class="sale-date">${sale.date}</div>
      </div>
      <div class="sale-price">${euro(Number(sale.price))}</div>
      <button class="delete" onclick="deleteSale(${realIndex})">×</button>
    `;
    list.appendChild(div);
  });
}

function addSale(){
  let item = document.getElementById("item").value.trim();
  let price = Number(document.getElementById("price").value);

  if(!item || !price){
    alert("Mets l’objet et le prix.");
    return;
  }

  sales.push({item,price,date:today()});
  document.getElementById("item").value="";
  document.getElementById("price").value="";
  save();
  render();
}

function deleteSale(i){
  sales.splice(i,1);
  save();
  render();
}

function changeGoal(){
  let g = prompt("Nouvel objectif en €", goal);
  if(g && Number(g)>0){
    goal = Number(g);
    save();
    render();
  }
}

function resetAll(){
  if(confirm("Tout supprimer ?")){
    sales = [];
    goal = 3000;
    save();
    render();
  }
}

render();
</script>
</body>
</html>
