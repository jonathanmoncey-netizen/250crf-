<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Objectif Cross">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Objectif Cross</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:linear-gradient(160deg,#050816,#101827);
  color:white;
  height:100vh;
  overflow:hidden;
}

.app{
  max-width:430px;
  height:100vh;
  margin:auto;
  padding:18px 14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{
  margin:0;
  font-size:25px;
  font-weight:900;
}

.badge{
  background:#1e293b;
  padding:9px 12px;
  border-radius:999px;
  font-size:13px;
  color:#a7f3d0;
  font-weight:700;
}

.card{
  background:rgba(30,41,59,.95);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  padding:16px;
  box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.stat{
  background:#0f172a;
  border-radius:18px;
  padding:14px;
}

.stat span{
  display:block;
  color:#94a3b8;
  font-size:12px;
  margin-bottom:6px;
}

.stat b{
  font-size:25px;
}

.green{color:#22c55e}

.bar{
  height:16px;
  background:#020617;
  border-radius:999px;
  overflow:hidden;
  margin-top:14px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#86efac);
  border-radius:999px;
}

.progress{
  margin-top:8px;
  color:#94a3b8;
  font-size:13px;
  display:flex;
  justify-content:space-between;
}

.inputs{
  display:grid;
  grid-template-columns:1fr 105px;
  gap:8px;
}

input{
  height:52px;
  border:none;
  outline:none;
  border-radius:16px;
  background:#0f172a;
  color:white;
  padding:0 14px;
  font-size:16px;
}

input::placeholder{color:#64748b}

button{
  border:none;
  border-radius:16px;
  height:50px;
  background:#22c55e;
  color:#03110a;
  font-weight:900;
  font-size:16px;
}

.add{
  margin-top:8px;
  width:100%;
}

.list{
  flex:1;
  overflow:auto;
  padding:8px;
  background:rgba(15,23,42,.8);
  border-radius:24px;
  border:1px solid rgba(255,255,255,.08);
}

.sale{
  display:grid;
  grid-template-columns:1fr auto 34px;
  align-items:center;
  gap:10px;
  background:#1e293b;
  border-radius:18px;
  padding:11px;
  margin-bottom:8px;
}

.sale-name{
  font-weight:800;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.sale-date{
  color:#94a3b8;
  font-size:11px;
  margin-top:2px;
}

.sale-price{
  color:#22c55e;
  font-weight:900;
}

.delete{
  width:34px;
  height:34px;
  border-radius:12px;
  background:#3f1d1d;
  color:#ff8a8a;
  font-size:20px;
}

.empty{
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:#94a3b8;
  font-size:14px;
}

.bottom{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.small{
  background:#334155;
  color:white;
  font-size:13px;
}
</style>
</head>

<body>
<div class="app">

  <div class="header">
    <div>
      <h1>Objectif Cross</h1>
      <div style="color:#94a3b8;font-size:13px;">Ventes pour arriver à 3 000 €</div>
    </div>
    <div class="badge">CRF 250</div>
  </div>

  <div class="card">
    <div class="stats">
      <div class="stat">
        <span>Récolté</span>
        <b id="total">0 €</b>
      </div>
      <div class="stat">
        <span>Reste</span>
        <b id="left" class="green">3 000 €</b>
      </div>
    </div>

    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>

    <div class="progress">
      <span id="percent">0%</span>
      <span id="count">0 vente</span>
    </div>
  </div>

  <div class="card">
    <div class="inputs">
      <input id="item" placeholder="Objet vendu">
      <input id="price" type="number" inputmode="decimal" placeholder="Prix €">
    </div>
    <button class="add" onclick="addSale()">+ Ajouter</button>
  </div>

  <div class="list" id="list"></div>

  <div class="bottom">
    <button class="small" onclick="changeGoal()">Objectif</button>
    <button class="small" onclick="resetAll()">Reset</button>
  </div>

</div>

<script>
let goal = Number(localStorage.getItem("goalCross") || 3000);
let sales = JSON.parse(localStorage.getItem("salesCross") || "[]");

function euro(n){
  return new Intl.NumberFormat("fr-FR",{
    style:"currency",
    currency:"EUR",
    maximumFractionDigits:0
  }).format(n);
}

function save(){
  localStorage.setItem("goalCross", goal);
  localStorage.setItem("salesCross", JSON.stringify(sales));
}

function today(){
  return new Date().toLocaleDateString("fr-FR",{
    day:"2-digit",
    month:"2-digit"
  });
}

function render(){
  let total = sales.reduce((s,x)=>s+Number(x.price),0);
  let left = Math.max(goal-total,0);
  let percent = Math.min((total/goal)*100,100);

  document.getElementById("total").textContent = euro(total);
  document.getElementById("left").textContent = euro(left);
  document.getElementById("fill").style.width = percent + "%";
  document.getElementById("percent").textContent = Math.round(percent) + "%";
  document.getElementById("count").textContent = sales.length + (sales.length>1 ? " ventes" : " vente");

  let list = document.getElementById("list");

  if(sales.length === 0){
    list.innerHTML = '<div class="empty">Aucune vente pour l’instant<br>Ajoute ton premier objet 👆</div>';
    return;
  }

  list.innerHTML = "";

  sales.slice().reverse().forEach((sale, index)=>{
    let realIndex = sales.length - 1 - index;

    let div = document.createElement("div");
    div.className = "sale";
    div.innerHTML = `
      <div>
        <div class="sale-name">${sale.item}</div>
        <div class="sale-date">${sale.date}</div>
      </div>
      <div class="sale-price">${euro(Number(sale.price))}</div>
      <button class="delete" onclick="deleteSale(${realIndex})">×</button>
    `;
    list.appendChild(div);
  });
}

function addSale(){
  let item = document.getElementById("item").value.trim();
  let price = Number(document.getElementById("price").value);

  if(!item || !price){
    alert("Mets l’objet et le prix.");
    return;
  }

  sales.push({
    item:item,
    price:price,
    date:today()
  });

  document.getElementById("item").value="";
  document.getElementById("price").value="";

  save();
  render();
}

function deleteSale(i){
  sales.splice(i,1);
  save();
  render();
}

function changeGoal(){
  let newGoal = prompt("Nouvel objectif en €", goal);
  if(newGoal && Number(newGoal)>0){
    goal = Number(newGoal);
    save();
    render();
  }
}

function resetAll(){
  if(confirm("Tout supprimer ?")){
    sales = [];
    goal = 3000;
    save();
    render();
  }
}

render();
</script>
</body>
</html>
